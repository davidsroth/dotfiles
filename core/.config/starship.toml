# ============================================================================
# Starship Prompt Configuration - Minimal & Fast
# ============================================================================
# Only modules that appear in `format` are evaluated. Keep this file trimmed
# to what the prompt actually renders; starship ships sensible defaults for
# everything else.

# Global settings
command_timeout = 1500       # ms
scan_timeout = 30            # ms for scanning files
add_newline = true
palette = "catppuccin_mocha"

# Format: user@host in dir (BRANCH) status
# Newline + character on second line.
format = """
$username$hostname in $directory$git_branch$git_status$line_break$character"""

# ============================================================================
# Module Configurations (only modules referenced in `format`)
# ============================================================================

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold fg:blue"
read_only = " 󰌾"
read_only_style = "fg:red"
home_symbol = "~"

[git_branch]
symbol = " "
style = "fg:mauve"
truncation_length = 20

[git_status]
style = "fg:red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# git_state is rendered implicitly during rebase/merge/cherry-pick even
# when not in `format`; style it so those banners match the palette.
[git_state]
style = "fg:peach"

[hostname]
# Show short host (before first dot). Only on SSH.
trim_at = "."
ssh_only = true
format = "[@$hostname]($style)"
style = "bold fg:mauve"
disabled = false
ssh_symbol = " "

[username]
format = "[$user]($style)"
style_root = "bold fg:red"
style_user = "bold fg:yellow"
show_always = true
disabled = false

# ============================================================================
# Palette - Catppuccin Mocha
# ============================================================================

[palettes.catppuccin_mocha]
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
